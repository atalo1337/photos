<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>媒体图床</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <h1>媒体图床</h1>
        <p>支持图片与视频（如 MP4）上传、历史记录、在线预览、下载和删除。</p>
      </header>

      <section class="panel upload-panel">
        <h2>上传媒体</h2>
        <div class="upload-controls">
          <input id="fileInput" type="file" multiple accept="image/*,video/*" />
          <button id="uploadBtn" class="primary">上传文件</button>
          <button id="clearBtn" class="danger">清空历史</button>
        </div>
        <p class="hint">文件会保存在当前浏览器（IndexedDB）中。</p>
      </section>

      <section class="panel history-panel">
        <div class="history-header">
          <h2>历史媒体</h2>
          <span id="stats"></span>
        </div>
        <div id="mediaGrid" class="media-grid" aria-live="polite"></div>
        <p id="emptyState" class="empty-state">暂无文件，请先上传。</p>
      </section>
    </main>

    <dialog id="previewDialog" class="preview-dialog">
      <div class="preview-content">
        <button id="closePreviewBtn" class="close-btn" aria-label="关闭预览">×</button>
        <h3 id="previewTitle"></h3>
        <div id="previewBody" class="preview-body"></div>
      </div>
    </dialog>

    <template id="mediaCardTemplate">
      <article class="media-card">
        <button class="thumb-btn" type="button"></button>
        <div class="media-meta">
          <strong class="file-name"></strong>
          <small class="file-info"></small>
        </div>
        <div class="media-actions">
          <button class="download-btn">下载</button>
          <button class="delete-btn danger">删除</button>
        </div>
      </article>
    </template>

    <script src="app.js" type="module"></script>
  </body>
</html>
